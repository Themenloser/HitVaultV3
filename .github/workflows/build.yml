name: Build HitVaultV3

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  android:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install
      
    - name: Build Android APK
      run: |
        cd android
        ./gradlew assembleRelease
        
    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: android/app/build/outputs/apk/release/app-release.apk
        
  ios:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install
      
    - name: Install CocoaPods
      run: |
        cd ios
        pod install
        
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
        
    - name: Check available simulators
      run: |
        echo "Available simulators:"
        xcrun simctl list devices available
        
    - name: Find iOS 18 simulator (fallback)
      id: find_simulator
      run: |
        # Try to find iOS 18.x simulator first
        IOS18_SIM=$(xcrun simctl list devices available | grep "iPhone 1[4-9]" | grep "iOS 18" | head -1 | grep -oE "[A-F0-9]{8}-[A-F0-9]{4}-[A-F0-9]{4}-[A-F0-9]{4}-[A-F0-9]{12}")
        
        # Fallback to any available iOS simulator if iOS 18 not found
        if [ -z "$IOS18_SIM" ]; then
          echo "iOS 18 simulator not found, using any available iOS simulator"
          IOS18_SIM=$(xcrun simctl list devices available | grep "iPhone" | head -1 | grep -oE "[A-F0-9]{8}-[A-F0-9]{4}-[A-F0-9]{4}-[A-F0-9]{4}-[A-F0-9]{12}")
        fi
        
        echo "simulator_id=$IOS18_SIM" >> $GITHUB_OUTPUT
        echo "Using simulator: $IOS18_SIM"
        
    - name: Build iOS App (with fallback)
      run: |
        cd ios
        
        # Try to build with explicit iOS 18 destination first
        if [ -n "${{ steps.find_simulator.outputs.simulator_id }}" ]; then
          echo "Building with iOS 18 simulator destination"
          xcodebuild -workspace HitVaultV3.xcworkspace \
                     -scheme HitVaultV3 \
                     -configuration Release \
                     -sdk iphonesimulator \
                     -destination "id=${{ steps.find_simulator.outputs.simulator_id }}" \
                     -derivedDataPath ./build \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO \
                     || echo "iOS 18 simulator build failed, trying generic build"
        fi
        
        # Fallback to generic iOS build if simulator-specific build fails
        echo "Attempting generic iOS build"
        xcodebuild -workspace HitVaultV3.xcworkspace \
                   -scheme HitVaultV3 \
                   -configuration Release \
                   -sdk iphonesimulator \
                   -derivedDataPath ./build \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGNING_ALLOWED=NO \
                   ONLY_ACTIVE_ARCH=NO \
                   || echo "Simulator build failed, trying device build"
        
        # Final fallback to device build
        echo "Attempting device build"
        xcodebuild -workspace HitVaultV3.xcworkspace \
                   -scheme HitVaultV3 \
                   -configuration Release \
                   -sdk iphoneos \
                   -derivedDataPath ./build \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGNING_ALLOWED=NO
        
    - name: Create IPA
      run: |
        cd ios
        
        # Try to create IPA from simulator build first
        if [ -d "./build/Build/Products/Release-iphonesimulator/HitVaultV3.app" ]; then
          echo "Creating IPA from simulator build"
          mkdir Payload
          cp -r ./build/Build/Products/Release-iphonesimulator/HitVaultV3.app Payload/
          zip -r HitVaultV3-simulator.ipa Payload/
        fi
        
        # Try to create IPA from device build
        if [ -d "./build/Build/Products/Release-iphoneos/HitVaultV3.app" ]; then
          echo "Creating IPA from device build"
          mkdir -p Payload-device
          cp -r ./build/Build/Products/Release-iphoneos/HitVaultV3.app Payload-device/
          zip -r HitVaultV3-device.ipa Payload-device/
        fi
        
        # Default to device IPA if both exist
        if [ -f "HitVaultV3-device.ipa" ]; then
          mv HitVaultV3-device.ipa HitVaultV3.ipa
        elif [ -f "HitVaultV3-simulator.ipa" ]; then
          mv HitVaultV3-simulator.ipa HitVaultV3.ipa
        else
          echo "No IPA created, checking build directory structure"
          find ./build -name "*.app" -type d || echo "No .app files found"
        fi
        
    - name: Upload iOS IPA
      uses: actions/upload-artifact@v4
      with:
        name: ios-ipa
        path: ios/HitVaultV3.ipa
      continue-on-error: true
