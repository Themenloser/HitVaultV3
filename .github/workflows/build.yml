name: Build HitVaultV3

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/app-release.apk

  ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Check available simulators
        run: |
          echo "Available simulators:"
          xcrun simctl list devices available

      - name: Find iOS 18 simulator (optional)
        id: find_simulator
        shell: bash
        run: |
          set +e
          IOS18_SIM=$(xcrun simctl list devices available | awk '
            /iOS 18\./ { ios18=1 }
            ios18 && /iPhone/ && /\(/ {
              match($0, /\(([A-F0-9-]+)\)/, m)
              if (m[1] != "") { print m[1]; exit }
            }
          ')
          if [ -z "$IOS18_SIM" ]; then
            echo "No iOS 18 simulator found. Falling back to generic iOS archive build."
          else
            echo "Found iOS 18 simulator: $IOS18_SIM"
          fi
          echo "simulator_id=$IOS18_SIM" >> $GITHUB_OUTPUT
          exit 0

      - name: Archive iOS app
        run: |
          cd ios
          xcodebuild \
            -workspace HitVaultV3.xcworkspace \
            -scheme HitVaultV3 \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath ./build/HitVaultV3.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean archive

      - name: Create ExportOptions.plist
        run: |
          cat > ios/ExportOptions.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          cd ios
          xcodebuild \
            -exportArchive \
            -archivePath ./build/HitVaultV3.xcarchive \
            -exportOptionsPlist ./ExportOptions.plist \
            -exportPath ./build/export \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ios/build/export/*.ipa
