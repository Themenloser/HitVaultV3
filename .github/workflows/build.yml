name: Build HitVaultV3

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: |
          cd android
          ./gradlew assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/app-release.apk

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: |
          cd ios
          pod install
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Archive iOS
        run: |
          cd ios
          xcodebuild \
            -workspace HitVaultV3.xcworkspace \
            -scheme HitVaultV3 \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ./build/HitVaultV3.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            clean archive
      - name: Export IPA (No Signing)
        run: |
          cd ios
          # Kein Export für unsigned Archive - direkt .app packen
          mkdir -p Payload
          cp -r ./build/HitVaultV3.xcarchive/Products/Applications/HitVaultV3.app Payload/
          zip -r HitVaultV3.ipa Payload/
      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ios/HitVaultV3.ipa
